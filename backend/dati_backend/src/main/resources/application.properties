spring.application.name=dati_backend
spring.datasource.url=jdbc:mysql://localhost:3306/dati_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0

app.jwt.secret=dati-system-jwt-secret-change-me-to-a-long-random-production-value
app.jwt.expire-minutes=720

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
